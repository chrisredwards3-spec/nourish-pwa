<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Nourish">
  <title>Nourish</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="app.css">
</head>
<body>

  <!-- Views -->
  <main id="app">

    <section id="view-today" class="view active">
      <header class="view-header">
        <h1 class="view-title">Today</h1>
        <span id="today-date" class="view-subtitle"></span>
      </header>
      <div id="today-content" class="view-body"></div>
    </section>

    <section id="view-week" class="view">
      <header class="view-header">
        <h1 class="view-title">This Week</h1>
        <span id="week-label" class="view-subtitle"></span>
      </header>
      <div id="week-content" class="view-body"></div>
    </section>

    <section id="view-recipes" class="view">
      <header class="view-header">
        <h1 class="view-title">Recipes</h1>
        <input id="recipe-search" type="search" placeholder="Search…" class="search-input" autocomplete="off">
      </header>
      <div id="recipes-filters" class="filter-bar"></div>
      <div id="recipes-content" class="view-body"></div>
    </section>

    <section id="view-build" class="view">
      <header class="view-header">
        <h1 class="view-title">Build a Meal</h1>
      </header>
      <div id="build-content" class="view-body"></div>
    </section>

    <section id="view-settings" class="view">
      <header class="view-header">
        <h1 class="view-title">Settings</h1>
      </header>
      <div id="settings-content" class="view-body"></div>
    </section>

  </main>

  <!-- Bottom nav -->
  <nav id="bottom-nav">
    <button class="nav-btn active" data-view="today">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Today</span>
    </button>
    <button class="nav-btn" data-view="week">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Week</span>
    </button>
    <button class="nav-btn" data-view="recipes">
      <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      <span>Recipes</span>
    </button>
    <button class="nav-btn" data-view="build">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span>Build</span>
    </button>
    <button class="nav-btn" data-view="settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span>Settings</span>
    </button>
  </nav>

  <!-- Recipe detail drawer -->
  <div id="recipe-drawer" class="drawer" aria-hidden="true">
    <div class="drawer-sheet">
      <div class="drawer-handle"></div>
      <div id="recipe-drawer-content" class="drawer-body"></div>
    </div>
    <div class="drawer-backdrop" id="recipe-drawer-backdrop"></div>
  </div>

  <!-- Shopping list modal -->
  <div id="shopping-modal" class="modal" aria-hidden="true">
    <div class="modal-sheet">
      <div class="modal-header">
        <h2>Shopping List</h2>
        <button id="shopping-close" class="modal-close">✕</button>
      </div>
      <div id="shopping-content" class="modal-body"></div>
    </div>
    <div class="modal-backdrop" id="shopping-backdrop"></div>
  </div>

  <!-- Onboarding overlay -->
  <div id="onboarding" class="onboarding" aria-hidden="true">
    <div class="onboarding-card">
      <h2 class="onboarding-title">Welcome to Nourish</h2>
      <p class="onboarding-sub">Rebecca's 90-day GF · DF · EF meal plan</p>
      <div id="onboarding-steps"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
